name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"] # 根據你的主分支名稱修改
  workflow_dispatch: # 允許手動觸發

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 如果你使用 npm，請使用 npm ci。如果使用 yarn、pnpm 則需調整
      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # 若有部署所需的環境變數可寫在此，例如:
          # VITE_API_URL: ${{ secrets.VITE_API_URL }}
          NODE_ENV: production

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Vite 預設打包出來的資料夾

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
